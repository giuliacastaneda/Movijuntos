<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - Movijuntos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="image/png" href="../imagens/iconBar-movijuntos.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-container">
        <div class="image-panel">
        </div>

        <div class="form-panel">
            <div class="form-content">
                <div class="logo">
                    <img src="/imagens/icon-movijuntos.png" alt="Logo Movijuntos">
                    <h2>Movijuntos</h2>
                </div>

                <h1>Meu Perfil</h1>

                <div id="view-mode">
                    <div class="info-field">
                        <label>Nome Completo</label>
                        <p id="view-nome">Carregando...</p>
                    </div>
                    <div class="info-field">
                        <label>Apelido</label>
                        <p id="view-apelido">Carregando...</p>
                    </div>
                    <div class="info-field">
                        <label>Email</label>
                        <p id="view-email">Carregando...</p>
                    </div>
                    <div class="info-field">
                        <label>Data de Nascimento</label>
                        <p id="view-nascimento">Carregando...</p>
                    </div>
                    <button id="btn-editar" class="btn-primary">Editar Perfil</button>
                </div>

                <form id="edit-mode" class="hidden">
                    <div class="input-group">
                        <label for="input-nome">Nome Completo</label>
                        <input type="text" id="input-nome" required>
                    </div>
                    <div class="input-group">
                        <label for="input-apelido">Apelido</label>
                        <input type="text" id="input-apelido" required>
                    </div>
                    <div class="input-group">
                        <label for="input-nascimento">Data de Nascimento</label>
                        <input type="date" id="input-nascimento" required>
                    </div>
                    <button type="submit" id="btn-salvar" class="btn-primary">Salvar Alterações</button>
                    <button type="button" id="btn-cancelar" class="btn-secondary">Cancelar</button>
                </form>

                <div id="success-message" class="hidden">Perfil atualizado com sucesso!</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
